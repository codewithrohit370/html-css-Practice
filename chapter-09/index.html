<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div Element</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- 9a -->
    <div class="div1"></div>

    <!-- 9b -->
    <div class="div2"></div>

    <!-- 9c -->
    <div class="div3">
        <p>Satisfied with our servce?</p>
        <button class="yes">Yes</button>
        <button class="no">No</button>
    </div>

    <!-- 9d -->
    <div class="div4">
        <p class="first">
            Install Youtube Music
        </p>

        <p class="second">
            Add Youtube Music to your desktop for quick and easy access.
        </p>
    </div>

    <!-- 9e -->
    <div class="div5">

        <img src="cat.jpg" class="cutie">

        <input type="text" class="text-box" placeholder="What's happening?">

        <button class="tweet-btn">
            Tweet
        </button>

    </div>

    <!-- 9f -->

    <div class="div6">
        <img src="cat.jpg" class="img1">
        <p class="p1">
            Oliver
        </p>
        <p class="p2">
            2 mutual friend
        </p>

        <button class="Add">
            Add Friends
        </button>
    </div>

    <!-- 9g -->

    <div class="div6 card1">
        <img src="cat.jpg" class="img1">
        <p class="p1">
            Oliver
        </p>
        <p class="p2">
            2 mutual friend
        </p>

        <button class="Add">
            Add Friends
        </button>
    </div>
    <div class="div6 card2">
        <img src="cat2.jpg" class="img1">
        <p class="p1">
            Mimi
        </p>
        <p class="p2">
            3 mutual friend
        </p>

        <button class="Add">
            Add Friends
        </button>
    </div>
    <div class="div6 card3">
        <img src="dog.jpg" class="img1">
        <p class="p1">
            Rex
        </p>
        <p class="p2">
            4 mutual friend
        </p>

        <button class="Add">
            Add Friends
        </button>
    </div>

    <!-- 9h -->

    <div class="div-h">
        <img src="google-logo.png" class="google">
    </div>
    <div class="div-h-1">
        <input type="text" class="Search" placeholder="Search Google or type a URL">
    </div>

    <div class="div-h-2">
        <button>
            Google Search
        </button>

        <button>
            I'm Feeling Lucky
        </button>
    </div>

</html>
