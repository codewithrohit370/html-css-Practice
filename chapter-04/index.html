<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .uber-btn {
            background-color: black;
            color: white;
            border: none;
            padding-top: 7px;
            padding-bottom: 7px;
            padding-left: 10px;
            padding-right: 10px;
            transition: opacity 0.15s;
            cursor: pointer;
        }

        .amazon-btn {
            background-color: rgb(246, 250, 0);
            border: none;
            padding: 9px 30px 9px 30px;
            border-radius: 16px;
            margin-right: 6px;
            transition: background-color 0.15s, opacity 0.15s;
            cursor: pointer;
        }

        .github-btn {
            background-color: rgb(46, 164, 79);
            color: white;
            font-weight: bold;
            padding: 8px 25px;
            border: none;
            cursor: pointer;
            border-radius: 7px;
            margin-right: 6px;
            transition: box-shadow 0.15s;
        }

        .bootstrap-btn-1 {
            background-color: rgb(121, 82, 179);
            color: white;
            padding: 9px 22px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: background-color 0.15s;
        }

        .bootstrap-btn-2 {
            background-color: white;
            color: rgb(108, 117, 125);
            border: 1px solid rgb(108, 117, 125);
            padding: 9px 22px;
            cursor: pointer;
            border-radius: 6px;
            margin-right: 6px;
            transition: background-color 0.25s, color 0.25s;
        }

        .linkedin-btn-1 {
            background-color: rgb(10, 145, 255);
            color: white;
            padding: 9px 15px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 6px;
            transition: background-color 0.15s;
        }

        .linkedin-btn-2 {
            background-color: white;
            color: rgb(10, 102, 125);
            border: 1px solid rgb(10, 102, 125);
            padding: 8px 15px;
            border-radius: 16px;
            margin-top: 5px;
            cursor: pointer;
            transition: border-width 0.15s, background-color 0.15s;
        }

        .tweet-btn {
            background-color: rgb(58, 161, 202);
            border: none;
            color: white;
            padding: 9px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        .back-btn {
            padding: 7px 10px;
            margin-right: 10px;
        }

        a {
            margin-right: 10px;
        }

        .next-btn {
            padding: 7px 10px;
        }

        .stretch-btn {
            background-color: green;
            color: white;
            border: none;
            padding: 9px 20px;
            cursor: pointer;
            transition: padding 1s;
        }

        .stretch-btn:hover {
            padding: 18px 40px;
        }

        .shadow-btn {
            background-color: green;
            color: white;
            cursor: pointer;
            padding: 9px 20px;
            border: none;
        }

        .shadow-btn:active {
            box-shadow: 2px 2px 7px gray;
        }

        .one-btn{
            margin-top: 20px;
            background-color: green;
            color: white;
            border: none;
            padding-top: 9px;
            padding-bottom: 9px;
            padding-left: 20px;
            padding-right: 20px;
            margin-right: 20px;
            margin-left: 20px;
            transition: padding-left 0.25s, padding-right 0.25s, margin-right 0.25s , margin-left 0.25s;
        }
        .one-btn:hover{
            padding-left: 25px;
            padding-right: 25px;
            margin-right:15px ;
            margin-left: 15px;
            
        }

        .two-btn{
            background-color: green;
            color: white;
            border: none;
             padding-top: 9px;
            padding-bottom: 9px;
            padding-left: 20px;
            padding-right: 20px;
            margin-right: 20px;
            margin-left: 20px;
            transition: padding-left 0.25s, padding-right 0.25s, margin-right 0.25s , margin-left 0.25s;
        }

        .two-btn:hover{
            padding-left: 25px;
            padding-right: 25px;
            margin-right:15px ;
            margin-left: 15px;
        }

        .three-btn{
            background-color: green;
            color: white;
            border: none;
             padding-top: 9px;
            padding-bottom: 9px;
            padding-left: 20px;
            padding-right: 20px;
            margin-right: 20px;
            margin-left: 20px;
            transition: padding-left 0.25s, padding-right 0.25s, margin-right 0.25s , margin-left 0.25s;
        }
        
        .three-btn:hover{
           padding-left: 25px;
            padding-right: 25px;
            margin-right:15px ;
            margin-left: 15px;
        }
    </style>
</head>

<body>
    <!-- 4a -->
    <button class="uber-btn">
        Request now
    </button>

    <!-- 4b -->
    <button class="amazon-btn">
        Add to Cart
    </button>

    <!-- 4c -->
    <button class="github-btn">
        Sign up
    </button>

    <!-- 4d  -->
    <button class="bootstrap-btn-1">
        Get started
    </button>

    <button class="bootstrap-btn-2">
        Download
    </button>

    <!-- 4e -->

    <button class="linkedin-btn-1">
        Apply on company website
    </button>

    <button class="linkedin-btn-2">
        Save
    </button>

    <!-- 4f -->
    <button class="tweet-btn">
        Tweet
    </button>

    <!-- 4g -->

    <!-- update color using devtools -->

    <!-- 4h -->
    <button class="back-btn">
        Back
    </button>
    <a href="">1</a>
    <a href="">2</a>
    <a href="">3</a>
    <a href="">4</a>
    <a href="">5</a>
    <button class="next-btn">
        Next
    </button>
    

    <!-- 4i -->
    <button class="stretch-btn">
        Stretch
    </button>

    <!-- 4j -->
    <button class="shadow-btn">
        Shadow
    </button>
    <br>

    <!-- 4k -->
     <button class="one-btn">

     </button>

     <button class="two-btn">

     </button>

     <button class="three-btn">

     </button>

</body>

</html>
