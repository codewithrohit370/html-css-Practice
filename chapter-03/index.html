<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .uber-btn{
            background-color: black;
            color: white;
            border: none;
            height: 32px;
            width: 120px;
            margin-right: 6px;
            transition: opacity 0.15s;
            cursor: pointer;
        }
        .uber-btn:hover{
            opacity: 0.8;
        }

        .amazon-btn{
            background-color: rgb(246, 250, 0);
            border: none;
            height: 32px;
            width: 130px;
            border-radius: 16px;
            margin-right: 6px;
            transition: background-color 0.15s , opacity 0.15s;
            cursor: pointer;
        }
        .amazon-btn:hover{
            background-color: rgb(253, 215, 23);
        }

        .github-btn{
            background-color: rgb(46, 164, 79);
            color: white;
            font-weight: bold;
            height: 32px;
            width: 80px;
            border: none;
            cursor: pointer;
            border-radius: 7px;
             margin-right: 6px;
             transition: box-shadow 0.15s;
        }

        .github-btn:hover{
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .bootstrap-btn-1{
           background-color: rgb(121, 82, 179);
           color: white;
           height: 32px;
           width: 100px;
           font-weight: bold;
           cursor: pointer;
           border: none;
           border-radius: 6px;
           transition: background-color 0.15s;
        }

        .bootstrap-btn-1:hover{
            background-color: rgb(109, 76, 156);
        }

        .bootstrap-btn-2{
            background-color: white;
            color: rgb(108, 117, 125);
            border: 1px solid rgb(108, 117, 125);
            height: 32px;
            width: 100px;
            cursor: pointer;
            border-radius: 6px;
             margin-right: 6px;
             transition: background-color 0.25s,color 0.25s;
        }

        .bootstrap-btn-2:hover{
            color: white;
            background-color: rgb(108, 117, 125);
        }

        .linkedin-btn-1{
            background-color: rgb(10, 145, 255);
            color: white;
            height: 32px;
            width: 200px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: bold;
             margin-right: 6px;
             transition: background-color 0.15s;
        }

        .linkedin-btn-1:hover{
            background-color: rgb(5, 110, 197);
        }


        .linkedin-btn-2{
            background-color: white;
            color: rgb(10, 102, 125);
            border: 1px solid rgb(10, 102, 125);
            height: 32px;
            width: 60px;
            border-radius: 16px;
            margin-top: 5px;
            cursor: pointer;
            transition: border-width 0.15s, background-color 0.15s;
        }

        .linkedin-btn-2:hover{
            border-width: 2px;
            background-color: rgba(0, 113, 133 , 0.2);
        }

        a{
            color: rgb(0, 113, 133);
            display: block;
            margin-top: 6px;
        }

        a:hover{
            color: orangered;
        }
        .n{
            font-weight: bolder;
            font-size: 25px;
        }
        .price{
            color: rgb(0, 118, 0);
        }
        .buy-btn{
            background-color: rgb(255, 164, 28);
            height: 32px;
            width: 100px;
            border: none;
            cursor: pointer;
            border-radius: 16px;
            transition: background-color 0.15s , opacity 0.15s;
        }
        .buy-btn:hover{
            background-color: rgb(248, 102, 5);
        }
        .buy-btn:active{
            opacity: 0.7;
        }

        .amazon-btn:active{
            opacity: 0.5;
        }

    </style>
</head>
<body>
    <!--  3a -->
    <button class="uber-btn">
        Request now
    </button>

    <!-- 3b -->
     <button class="amazon-btn">
        Add to Cart
     </button>

    <!-- 3c -->
      <button class="github-btn">
        Sign up
      </button>

    <!-- 3d  -->
    <button class="bootstrap-btn-1">
        Get started
    </button>

    <button class="bootstrap-btn-2">
        Download
    </button>

    <!-- 3e -->

    <button class="linkedin-btn-1">
        Apply on company website
    </button>

    <button class="linkedin-btn-2">
        Save
    </button>

    <!-- 3F -->
    <a href="amazon.com">Back to Amazon</a>
    <p class="n">Nike Back Running Shoes</p>
    <p class="price">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
     <button class="amazon-btn">
        Add to Cart
     </button>
    <button class="buy-btn">
        Buy now
    </button>



</body>
</html>
