<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .uber-btn{
            background-color: black;
            color: white;
            border: none;
            height: 32px;
            width: 120px;
            margin-right: 6px;
        }

        .amazon-btn{
            background-color: rgb(255, 216, 20);
            border: none;
            height: 32px;
            width: 130px;
            border-radius: 16px;
             margin-right: 6px;
        }

        .github-btn{
            background-color: rgb(46, 164, 79);
            color: white;
            font-weight: bold;
            height: 32px;
            width: 80px;
            border: none;
            border-radius: 7px;
             margin-right: 6px;
        }

        .bootstrap-btn-1{
           background-color: rgb(121, 82, 179);
           color: white;
           height: 32px;
           width: 100px;
           font-weight: bold;
           border: none;
           border-radius: 6px;
        }

        .bootstrap-btn-2{
            background-color: white;
            color: rgb(108, 117, 125);
            border: 1px solid rgb(108, 117, 125);
            height: 32px;
            width: 100px;
            border-radius: 6px;
             margin-right: 6px;
        }

        .linkedin-btn-1{
            background-color: rgb(10, 102, 125);
            color: white;
            height: 32px;
            width: 200px;
            border: none;
            border-radius: 16px;
            font-weight: bold;
             margin-right: 6px;
        }

        .linkedin-btn-2{
            background-color: white;
            color: rgb(10, 102, 125);
            border: 1px solid rgb(10, 102, 125);
            height: 32px;
            width: 60px;
            border-radius: 16px;
            margin-top: 5px;
        }

        a{
            color: rgb(0, 113, 133);
            display: block;
            margin-top: 6px;
        }
        .n{
            font-weight: bolder;
            font-size: 25px;
        }
        .price{
            color: rgb(0, 118, 0);
        }
        .buy-btn{
            background-color: rgb(255, 164, 28);
            height: 32px;
            width: 100px;
            border: none;
            border-radius: 16px;
        }

    </style>
</head>
<body>
    <!-- 2a -->
    <button class="uber-btn">
        Request now
    </button>

    <!-- 2b -->
     <button class="amazon-btn">
        Add to Cart
     </button>

    <!-- 2c -->
      <button class="github-btn">
        Sign up
      </button>

    <!-- 2d  -->
    <button class="bootstrap-btn-1">
        Get started
    </button>

    <button class="bootstrap-btn-2">
        Download
    </button>

    <!-- 2e -->

    <button class="linkedin-btn-1">
        Apply on company website
    </button>

    <button class="linkedin-btn-2">
        Save
    </button>

    <!-- 2F -->
    <a href="amazon.com">Back to Amazon</a>
    <p class="n">Nike Back Running Shoes</p>
    <p class="price">$39 - in stock.</p>
    <p>Free delivery tomorrow.</p>
     <button class="amazon-btn">
        Add to Cart
     </button>
    <button class="buy-btn">
        Buy now
    </button>



</body>
</html>
